<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Research Experiment Runner.skill banner</title>
  <desc id="desc">Dark dashboard banner for a local-first AI model experiment runner skill.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070b"/>
      <stop offset="0.52" stop-color="#09111d"/>
      <stop offset="1" stop-color="#02040a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #94a3b8; }
      .line { stroke: #1e293b; stroke-width: 1; }
      .panel { fill: #0b1220; stroke: #263449; stroke-width: 1.4; }
      .panel2 { fill: #0f172a; stroke: #334155; stroke-width: 1.2; }
      .tiny { font-size: 12px; letter-spacing: 0; }
      .small { font-size: 15px; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity="0.45">
    <path d="M40 80 H448 C500 80 508 132 548 132 H570" fill="none" stroke="#1e293b" stroke-width="1.5"/>
    <path d="M42 592 H520 C555 592 570 548 612 548 H650" fill="none" stroke="#1e293b" stroke-width="1.5"/>
    <path d="M30 120 H54 M74 120 H95" stroke="#86efac" stroke-width="3"/>
    <circle cx="585" cy="132" r="4" fill="#2563eb"/>
    <circle cx="650" cy="548" r="4" fill="#10b981"/>
  </g>

  <g class="sans">
    <text x="64" y="155" font-size="76" font-weight="850" fill="#f8fafc">Research</text>
    <text x="64" y="244" font-size="78" font-weight="850" fill="url(#blue)">Experiment</text>
    <text x="64" y="334" font-size="76" font-weight="850" fill="#f8fafc">Runner<tspan fill="#3b82f6">.skill</tspan></text>
    <path d="M64 374 H540" stroke="#334155" stroke-width="2"/>
    <text x="64" y="420" font-size="30" fill="#cbd5e1">local-first model validation</text>
  </g>

  <g class="sans" transform="translate(62 466)">
    <g>
      <circle cx="20" cy="19" r="16" fill="#0b2a4a" stroke="#2563eb"/>
      <path d="M20 8 V30 M9 19 H31" stroke="#60a5fa" stroke-width="3"/>
      <text x="0" y="62" font-size="13" fill="#dbeafe">DEFINE</text>
    </g>
    <g transform="translate(112 0)">
      <circle cx="20" cy="19" r="16" fill="#0b2a1c" stroke="#10b981"/>
      <path d="M12 27 L19 15 L25 22 L32 8" fill="none" stroke="#86efac" stroke-width="3"/>
      <text x="-5" y="62" font-size="13" fill="#dcfce7">METRICS</text>
    </g>
    <g transform="translate(224 0)">
      <circle cx="20" cy="19" r="16" fill="#3b2508" stroke="#f59e0b"/>
      <rect x="11" y="10" width="18" height="18" rx="3" fill="none" stroke="#fbbf24" stroke-width="3"/>
      <text x="-10" y="62" font-size="13" fill="#fef3c7">HARDWARE</text>
    </g>
    <g transform="translate(352 0)">
      <circle cx="20" cy="19" r="16" fill="#092b1d" stroke="#22c55e"/>
      <path d="M12 19 L18 25 L31 11" fill="none" stroke="#86efac" stroke-width="3"/>
      <text x="-18" y="62" font-size="13" fill="#dcfce7">REPRODUCE</text>
    </g>
    <g transform="translate(490 0)">
      <circle cx="20" cy="19" r="16" fill="#081d3d" stroke="#3b82f6"/>
      <path d="M13 10 H25 L31 16 V30 H13 Z M25 10 V16 H31" fill="none" stroke="#93c5fd" stroke-width="2"/>
      <text x="-4" y="62" font-size="13" fill="#dbeafe">REPORT</text>
    </g>
  </g>

  <g transform="translate(606 70)">
    <rect x="0" y="0" width="540" height="535" rx="22" class="panel"/>
    <text x="28" y="42" class="mono small" fill="#cbd5e1">EXPERIMENT DASHBOARD</text>
    <g transform="translate(26 68)">
      <rect width="215" height="132" rx="10" class="panel2"/>
      <text x="16" y="28" class="mono tiny" fill="#cbd5e1">METRICS OVER TIME</text>
      <path d="M28 98 H190 M28 72 H190 M28 46 H190" stroke="#1e293b"/>
      <path d="M30 100 L65 85 L100 66 L138 55 L184 38" fill="none" stroke="#3b82f6" stroke-width="4" filter="url(#glow)"/>
      <path d="M30 110 L72 100 L112 84 L150 73 L184 59" fill="none" stroke="#22c55e" stroke-width="4"/>
      <circle cx="184" cy="38" r="5" fill="#60a5fa"/>
      <circle cx="184" cy="59" r="5" fill="#86efac"/>
    </g>
    <g transform="translate(260 68)">
      <rect width="250" height="132" rx="10" class="panel2"/>
      <text x="16" y="28" class="mono tiny" fill="#cbd5e1">MODEL UNDER TEST</text>
      <rect x="18" y="48" width="42" height="42" rx="8" fill="#111827" stroke="#64748b"/>
      <text x="78" y="60" class="sans small" font-weight="700" fill="#f8fafc">Qwen2.5-7B-Instruct</text>
      <text x="78" y="82" class="mono tiny" fill="#94a3b8">GGUF Q4_K_M</text>
      <text x="78" y="103" class="mono tiny" fill="#94a3b8">loaded 100%</text>
      <rect x="18" y="112" width="210" height="8" rx="4" fill="#164e33"/>
      <rect x="18" y="112" width="210" height="8" rx="4" fill="url(#green)"/>
    </g>
    <g transform="translate(26 222)">
      <rect width="484" height="116" rx="10" class="panel2"/>
      <text x="16" y="28" class="mono tiny" fill="#cbd5e1">COMMAND LOG</text>
      <text x="18" y="56" class="mono tiny" fill="#86efac">$ source .venv/bin/activate</text>
      <text x="18" y="78" class="mono tiny" fill="#86efac">$ python run_inference.py --backend mlx</text>
      <text x="18" y="100" class="mono tiny" fill="#86efac">$ python render_report.py</text>
    </g>
    <g transform="translate(26 360)">
      <rect width="316" height="130" rx="10" class="panel2"/>
      <text x="16" y="28" class="mono tiny" fill="#cbd5e1">STORAGE MAP</text>
      <g class="mono tiny" fill="#cbd5e1">
        <text x="18" y="62">models</text><text x="18" y="86" fill="#60a5fa">42.3 GB</text>
        <text x="96" y="62">cache</text><text x="96" y="86" fill="#86efac">18.7 GB</text>
        <text x="172" y="62">venvs</text><text x="172" y="86" fill="#fbbf24">8.6 GB</text>
        <text x="242" y="62">tmp</text><text x="242" y="86" fill="#94a3b8">1.2 GB</text>
      </g>
      <rect x="18" y="101" width="270" height="8" rx="4" fill="#1e293b"/>
      <rect x="18" y="101" width="118" height="8" rx="4" fill="#3b82f6"/>
      <rect x="136" y="101" width="52" height="8" rx="4" fill="#22c55e"/>
      <rect x="188" y="101" width="38" height="8" rx="4" fill="#f59e0b"/>
    </g>
    <g transform="translate(360 360)">
      <rect width="150" height="130" rx="10" class="panel2"/>
      <text x="18" y="28" class="mono tiny" fill="#cbd5e1">LATEST RESULT</text>
      <circle cx="75" cy="68" r="34" fill="none" stroke="#164e33" stroke-width="10"/>
      <circle cx="75" cy="68" r="34" fill="none" stroke="#22c55e" stroke-width="10" stroke-dasharray="178 214" transform="rotate(-90 75 68)"/>
      <text x="54" y="80" class="sans" font-size="34" font-weight="800" fill="#f8fafc">85</text>
      <rect x="25" y="101" width="100" height="18" rx="6" fill="#052e1a" stroke="#166534"/>
      <text x="56" y="114" class="mono tiny" fill="#86efac">PASS</text>
    </g>
  </g>
</svg>
